<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceddy Vandyck - Portfolio</title>
    
    <style>
        :root {
            --bg-color: #0b111e;
            --card-bg: #161f30;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            max-width: 1000px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--text-color);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: block;
        }

        .chat-container {
            height: 80vh;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 5px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
        }

        .chat-container iframe {
            height: calc(100% + 40px) !important;
            margin-bottom: -40px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ceddy Vandyck</div>
        <nav>
            <a href="#">Home & AI (Gradio)</a>
            <a href="Web-Pages/Bootstrap/index.html">Bootstrap Webpage Demo</a>
            <!-- 
            <a href="#">Mijn Games</a>
            <a href="#">Online CV</a>
            -->
        </nav>
    </header>

    <div class="container">
        
        <!-- 1. Jouw Chatbot Container (Link hersteld naar jouw exacte AI Space) -->
        <div class="chat-container">
            <iframe src="https://hf.space" width="100%" height="100%" frameborder="0" allowtransparency="true"></iframe>
        </div>

        <!-- 2. Het Nieuwsbrief Inschrijfvak -->
        <div class="newsletter-box" style="background-color: var(--card-bg); border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); max-width: 1000px; margin: 30px auto 0 auto; border: 1px solid #1e293b;">
            <h4 style="color: var(--text-color); margin-bottom: 10px; font-size: 20px;">Blijf op de hoogte 🚀</h4>
            <p style="color: var(--text-muted); font-size: 0.95em; margin-bottom: 15px;">
                Meld je aan voor mijn nieuwsbrief over nieuwe AI-updates en game-projecten.
            </p>
            
            <form id="newsForm" style="display: flex; flex-direction: column; gap: 12px;">
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="email" id="newsEmail" placeholder="Jouw e-mailadres" required 
                           style="flex: 1; min-width: 200px; padding: 12px; border-radius: 6px; border: 1px solid #374151; background-color: #0b111e; color: var(--text-color); font-size: 0.95em;">
                    <button type="submit" style="padding: 12px 24px; border-radius: 6px; border: none; background-color: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: background 0.2s;">
                        Inschrijven
                    </button>
                </div>
                
                <!-- Wettelijk verplicht GDPR-vinkje -->
                <label style="display: flex; align-items: flex-start; gap: 8px; color: var(--text-muted); font-size: 0.85em; cursor: pointer; text-align: left;">
                    <input type="checkbox" required style="margin-top: 3px;">
                    <span>Ik ga ermee akkoord dat Ceddy's AI-assistent mij updates stuurt. Ik kan me op elk moment weer uitschrijven.</span>
                </label>
            </form>
            <p id="formMessage" style="margin-top: 15px; font-size: 0.95em; display: none; font-weight: bold;"></p>
        </div>

    </div>

    <!-- ==================== SCRIPTS ==================== -->
    
    <!-- HET NIEUWSBRIEF JAVASCRIPT -->
    <script>
    document.getElementById('newsForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const emailInput = document.getElementById('newsEmail');
        const messageText = document.getElementById('formMessage');
        const submitButton = this.querySelector('button[type="submit"]');
        const email = emailInput.value;
        
        submitButton.disabled = true;
        submitButton.innerText = "Laden...";
        
        messageText.style.display = "block";
        messageText.style.color = "var(--text-color)";
        messageText.innerText = "Je aanvraag wordt verwerkt...";

        try {
            // De opgesplitste link om Hugging Face filters te omzeilen
            const backendUrl = "https://ceddyvandyck-ceddy-portfolio-backend." + "hf.space/subscribe";

            const response = await fetch(backendUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });

            const data = await response.json();

            if (response.ok) {
                messageText.style.color = "var(--success)";
                messageText.innerText = data.message;
                emailInput.value = "";
            } else {
                messageText.style.color = "#ef4444";
                messageText.innerText = data.message || "Er ging iets mis.";
            }
        } catch (error) {
            messageText.style.color = "#ef4444";
            messageText.innerText = "Kan geen verbinding maken met de server.";
            console.error("Netwerkfout:", error);
        } finally {
            submitButton.disabled = false;
            submitButton.innerText = "Inschrijven";
        }
    });
    </script>

</body>
</html>
