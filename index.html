<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceddy Vandyck - Portfolio</title>
    
    <style>
        :root {
            --bg-color: #0b111e;
            --card-bg: #161f30;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            max-width: 1000px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--text-color);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: block;
        }

        .chat-container {
            height: 80vh;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 5px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
        }

        .chat-container iframe {
            height: calc(100% + 40px) !important;
            margin-bottom: -40px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ceddy Vandyck</div>
        <nav>
            <a href="#">Home & AI (Gradio)</a>
            <a href="Web-Pages/Bootstrap/index.html">Bootstrap Webpage Demo</a>
            <a href="newsletter.html">Nieuwsbrief</a>
            <!-- 
            <a href="#">Mijn Games</a>
            <a href="#">Online CV</a>
            -->
        </nav>
    </header>

    <div class="container">
        
    <div class="container">
        <!-- Jouw Chatbot Container met een directe, onbreekbare link -->
        <div class="chat-container" id="chatbotVak">
            <iframe 
                src="https://hf.space" 
                frameborder="0" 
                width="100%" 
                height="100%" 
                style="border-radius: 8px; background-color: transparent; overflow: hidden;">
            </iframe>
        </div>
    </div>

    <!-- Het JavaScript-gedeelte onderaan is nu helemaal leeg en kan niks meer slopen! -->
    <script>
        // JavaScript is hier niet meer nodig voor het iframe
    </script>
</body>
</html>
