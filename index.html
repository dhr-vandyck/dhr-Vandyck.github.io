<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceddy Vandyck - Portfolio</title>
    <style>
        :root {
            --bg-color: #0b111e;
            --card-bg: #161f30;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            max-width: 1000px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--text-color);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: block; /* Haalt de twee kolommen weg */
        }

        /* De chatbox is nu gecentreerd en lekker breed */


        .chat-container {
            height: 80vh;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 5px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden; /* Dit snijdt alles af wat buiten de box valt */
            position: relative;
        }

        /* Dit trucje zorgt ervoor dat de iframe onderaan 40 pixels groter is, 
           waardoor de Gradio-balk precies achter de rand van je container verdwijnt! */
        .chat-container iframe {
            height: calc(100% + 40px) !important;
            margin-bottom: -40px;
        }




        
    </style>
</head>
<body>

    <header>
        <div class="logo">Ceddy Vandyck</div>
        <nav>
            <a href="#">Home & AI (Gradio)</a>
            <!-- 
            <a href="#">Mijn Games</a>
            <a href="#">Online CV</a>
            -->
        </nav>
    </header>

    <div class="container">
        <!-- Alleen de prachtige, brede chatbox overgebleven -->
        <div class="chat-container" id="chatbotVak"></div>
    </div>

    <script>
        const linkDeel1 = "https://huggingface.co/"; 
        const linkDeel2 = "spaces/CeddyVandyck/ceddy-portfolio-ai";
        const linkDeel3 = "/embed";
        
        const completeUrl = linkDeel1 + linkDeel2 + linkDeel3;

        const containerVak = document.getElementById("chatbotVak");
        containerVak.innerHTML = `
            <iframe 
                src="${completeUrl}" 
                frameborder="0" 
                width="100%" 
                height="100%" 
                style="border-radius: 8px; background-color: transparent; overflow: hidden;">
            </iframe>
        `;
    </script>
</body>
</html>
