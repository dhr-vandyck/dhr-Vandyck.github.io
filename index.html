<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn AI Assistent</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background-color: #1a1a1e;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #29292e;
        }

        .chat-header {
            background-color: #04d361;
            color: #0a0a0c;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .status-dot {
            width: 100%;
            max-width: 10px;
            height: 10px;
            background-color: #0a0a0c;
            border-radius: 50%;
        }

        .messages-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Scrollbar styling */
        .messages-box::-webkit-scrollbar {
            width: 6px;
        }
        .messages-box::-webkit-scrollbar-thumb {
            background-color: #29292e;
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .message.user {
            background-color: #29292e;
            color: #e1e1e6;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.ai {
            background-color: #202024;
            color: #e1e1e6;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border-left: 3px solid #04d361;
        }

        .message.loading {
            background-color: transparent;
            color: #8d8d99;
            align-self: flex-start;
            font-style: italic;
            padding: 0 10px;
        }

        .input-area {
            padding: 15px 20px;
            background-color: #202024;
            display: flex;
            gap: 10px;
            border-top: 1px solid #29292e;
        }

        .input-area input {
            flex: 1;
            background-color: #121214;
            border: 1px solid #29292e;
            padding: 12px;
            border-radius: 6px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #04d361;
        }

        .input-area button {
            background-color: #04d361;
            color: #0a0a0c;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .input-area button:hover {
            background-color: #00b34d;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="status-dot"></div>
            <span>Mijn AI Assistent</span>
        </div>
        
        <div class="messages-box" id="messagesBox">
            <div class="message ai">Hallo! Ik ben jouw AI-assistent. Hoe kan ik je vandaag helpen?</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Typ een bericht..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Verzend</button>
        </div>
    </div>

    <script>
        let conversationHistory = [];

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const messageText = input.value.trim();
            if (!messageText) return;

            const messagesBox = document.getElementById('messagesBox');
            
            // 1. Toon gebruikersbericht
            messagesBox.innerHTML += `<div class="message user">${messageText}</div>`;
            conversationHistory.push({ role: "user", content: messageText });
            input.value = '';
            messagesBox.scrollTop = messagesBox.scrollHeight;

            // 2. Toon laad-animatie
            messagesBox.innerHTML += `<div class="message loading" id="loading">AI is aan het nadenken...</div>`;
            messagesBox.scrollTop = messagesBox.scrollHeight;

            try {
                // 3. Verzoek naar Vercel backend
                const response = await fetch('https://vercel.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                const data = await response.json();
                
                // Verwijder laad-animatie
                document.getElementById('loading').remove();

                // 4. Toon AI antwoord
                const aiReply = data.choices[0].message.content;
                messagesBox.innerHTML += `<div class="message ai">${aiReply}</div>`;
                conversationHistory.push({ role: "assistant", content: aiReply });
                messagesBox.scrollTop = messagesBox.scrollHeight;

            } catch (error) {
                const loadingElement = document.getElementById('loading');
                if (loadingElement) loadingElement.remove();
                
                messagesBox.innerHTML += `<div class="message ai" style="border-left-color: #f75a68;"><b>Fout:</b> Er kon geen verbinding worden gemaakt met de AI-server.</div>`;
                console.error(error);
                messagesBox.scrollTop = messagesBox.scrollHeight;
            }
        }
    </script>

</body>
</html>
