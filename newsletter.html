<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceddy Vandyck - Nieuwsbrief</title>
    <style>
        :root {
            --bg-color: #0b111e;
            --card-bg: #161f30;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            max-width: 1000px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--text-color);
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
        }

        .box {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #1e293b;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #1e293b;
            background-color: #0b111e;
            color: var(--text-color);
            font-size: 0.95em;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .message {
            margin-top: 15px;
            font-size: 0.95em;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ceddy Vandyck</div>
        <nav>
            <a href="index.html">Home & AI (Gradio)</a>
            <a href="newsletter.html" style="color: var(--text-color);">Nieuwsbrief</a>
            <a href="Web-Pages/Bootstrap/index.html">Bootstrap Webpage Demo</a>
        </nav>
    </header>

    <div class="container">
        <div class="box">
            <h3 style="margin-bottom: 10px;">Blijf op de hoogte 🚀</h3>
            <p style="color: var(--text-muted); font-size: 0.9em; margin-bottom: 20px;">
                Meld je aan voor mijn nieuwsbrief over nieuwe AI-updates en game-projecten.
                Dit is momenteel nog in test versie.
                Er worden nog geen mails verstuurd.
            </p>
            
            <form id="newsForm">
                <input type="email" id="newsEmail" placeholder="Jouw e-mailadres" required>
                
                <label style="display: flex; align-items: flex-start; gap: 8px; color: var(--text-muted); font-size: 0.85em; cursor: pointer; margin-bottom: 20px;">
                    <input type="checkbox" required style="margin-top: 3px;">
                    <span>Ik ga ermee akkoord dat Ceddy mij updates stuurt. Ik kan me op elk moment weer uitschrijven.</span>
                </label>
                
                <button type="submit" id="submitBtn">Inschrijven</button>
            </form>
            
            <p id="formMessage" class="message"></p>
        </div>
    </div>

    <script>
    document.getElementById('newsForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const emailInput = document.getElementById('newsEmail');
        const messageText = document.getElementById('formMessage');
        const submitButton = document.getElementById('submitBtn');
        const email = emailInput.value;
        
        submitButton.disabled = true;
        submitButton.innerText = "Verwerken...";
        
        messageText.style.display = "block";
        messageText.style.color = "var(--text-color)";
        messageText.innerText = "Je aanvraag wordt verwerkt...";

        try {
            // De opgesplitste link om Hugging Face filters veilig te omzeilen
            const backendUrl = "https://ceddyvandyck-ceddy-portfolio-backend." + "hf.space/subscribe";

            const response = await fetch(backendUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });

            const data = await response.json();

            if (response.ok) {
                messageText.style.color = "var(--success)";
                messageText.innerText = data.message;
                emailInput.value = "";
            } else {
                messageText.style.color = "#ef4444";
                messageText.innerText = data.message || "Er ging iets mis.";
            }
        } catch (error) {
            messageText.style.color = "#ef4444";
            messageText.innerText = "Kan geen verbinding maken met de server.";
        } finally {
            submitButton.disabled = false;
            submitButton.innerText = "Inschrijven";
        }
    });
    </script>

</body>
</html>
