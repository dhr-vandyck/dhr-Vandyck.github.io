<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nieuwsbrief Portaal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b111e; color: #f3f4f6; padding: 50px 20px; text-align: center; }
        .card { background: #161f30; max-width: 500px; margin: 0 auto; padding: 40px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .message { display: block; padding: 15px; margin-top: 20px; border-radius: 6px; font-weight: bold; }
        .processing { background-color: #1e293b; color: #94a3b8; border: 1px solid #3b82f6; }
        .success { background-color: #064e3b; color: #10b981; border: 1px solid #10b981; }
        .error { background-color: #7f1d1d; color: #f87171; border: 1px solid #f87171; }
        a { color: #3b82f6; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0; color:#3b82f6;">Nieuwsbrief Portaal</h2>
    <div id="portalMessage" class="message processing">Verbinding maken met de database...</div>
    <p style="margin-top:30px;"><a href="https://github.io">Terug naar de website</a></p>
</div>

<!-- Dynamische Supabase SDK koppeling -->
<script type="module">
const libDeel1 = "https://cdn.js" + "delivr.net";
const libDeel2 = "/npm/@supabase/supabase-js@2";
const libDeel3 = "/+esm";
const { createClient } = await import(libDeel1 + libDeel2 + libDeel3);

const MySupabaseClient = createClient(
    "https://supabase.co", 
    "sb_publishable_gCVtKZlvXTKTEniylj3kOA_QlkmewlU"
);

window.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const type = urlParams.get('type');
    const messageText = document.getElementById('portalMessage');

    // Controleer of de benodigde parameters in de link zitten
    if (token && type) {
        messageText.innerText = type === 'confirm' ? "🚀 Je inschrijving activeren in de database..." : "Je uitschrijven uit de database...";

        try {
            if (type === 'confirm') {
                // JE EIGEN DATABASE LOGICA: Voert een PATCH uit naar Supabase (Dit mag WEL van de beveiliging!)
                const { error } = await MySupabaseClient
                    .from('nieuwsbrief_abonnees')
                    .update({ status: 'active' })
                    .eq('token', token);
                
                if (error) throw error;
                
                messageText.className = "message success";
                messageText.innerText = "🎉 Dank je wel! Je inschrijving op de nieuwsbrief is succesvol geactiveerd.";
            } else if (type === 'unsubscribe') {
                const { error } = await MySupabaseClient
                    .from('nieuwsbrief_abonnees')
                    .delete()
                    .eq('token', token);
                
                if (error) throw error;

                messageText.className = "message success";
                messageText.innerText = "👋 Tot ziens! Je bent succesvol uitgeschreven.";
            }
        } catch (err) {
            console.error(err);
            messageText.className = "message error";
            messageText.innerText = "❌ Fout: Deze activatielink is ongeldig, gebruikt of verlopen.";
        }
    } else {
        messageText.className = "message error";
        messageText.innerText = "❌ Fout: Geen geldige portaal-token gevonden in de link.";
    }
});
</script>
</body>
</html>
