<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nieuwsbrief Inschrijven</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b111e; color: #f3f4f6; padding: 50px 20px; text-align: center; }
        .card { background: #161f30; max-width: 500px; margin: 0 auto; padding: 40px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: left; }
        h2 { margin-top: 0; color: #3b82f6; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #94a3b8; }
        input[type="email"] { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #1e293b; background-color: #0b111e; color: #f3f4f6; box-sizing: border-box; font-size: 16px; }
        input[type="email"]:focus { outline: none; border-color: #3b82f6; }
        .checkbox-group { margin-bottom: 20px; display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: #94a3b8; }
        .checkbox-group input { margin-top: 3px; }
        button { width: 100%; padding: 14px; background-color: #3b82f6; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #1e293b; color: #64748b; cursor: not-allowed; }
        .message { display: none; padding: 15px; margin-top: 20px; border-radius: 6px; font-weight: bold; font-size: 14px; text-align: center; }
        .processing { display: block; background-color: #1e293b; color: #94a3b8; border: 1px solid #3b82f6; }
        .success { display: block; background-color: #064e3b; color: #10b981; border: 1px solid #10b981; }
        .error { display: block; background-color: #7f1d1d; color: #f87171; border: 1px solid #f87171; }
        a { color: #3b82f6; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <h2>Blijf op de hoogte</h2>
    <p style="color: #94a3b8; margin-bottom: 30px; text-align: center;">Meld je aan voor mijn nieuwsbrief over nieuwe AI-updates en game-projecten. Je ontvangt direct een welkomstmail na je aanmelding!</p>

    <form id="newsletterForm">
        <div class="form-group">
            <label for="emailInput">E-mailadres</label>
            <input type="email" id="emailInput" placeholder="jouw@email.com" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="agreeCheckbox" required>
            <label for="agreeCheckbox">Ik ga ermee akkoord dat Ceddy mij updates stuurt. Ik kan me op elk moment weer uitschrijven.</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="privacyCheckbox" required>
            <label for="privacyCheckbox">Gelezen en goedgekeurd: <a href="#">Lees de voorwaarden & privacy</a>.</label>
        </div>

        <button type="submit" id="submitBtn">Inschrijven</button>
    </form>

    <div id="responseMessage" class="message"></div>
</div>

<script>
// Jouw tabel-opzet hersteld om rechtstreeks naar de tabel te schrijven
const domeinDeel1 = "https://ozcsksqiizlhgrskmada";
const domeinDeel2 = ".supabase.co/rest/v1/";
const tabelNaam   = "nieuwsbrief_abonnees";

const SUPABASE_REST_URL = domeinDeel1 + domeinDeel2 + tabelNaam;
const SUPABASE_ANON_KEY = "sb_publishable_gCVtKZlvXTKTEniylj3kOA_QlkmewlU";

document.getElementById('newsletterForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const emailInputWaarde = document.getElementById('emailInput').value;
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('responseMessage');

    submitBtn.disabled = true;
    messageBox.className = "message processing";
    messageBox.innerText = "⏳ Bezig met inschrijven...";

    try {
        // We sturen via POST rechtstreeks naar de tabel en sturen ALLEEN het e-mailadres mee!
        const response = await fetch(SUPABASE_REST_URL, {
            method: "POST",
            headers: {
                "apikey": SUPABASE_ANON_KEY,
                "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "return=representation"
            },
            body: JSON.stringify({
                email: emailInputWaarde // Puur en alleen het e-mailadres!
            })
        });

        const data = await response.json();

        // Als het e-mailadres al bestaat, geeft PostgreSQL een 409 of een unieke schendingsfout
        if (!response.ok) {
            if (data.code === "23505" || (data.message && data.message.includes("already exists"))) {
                throw new Error("Dit e-mailadres is al aangemeld voor de nieuwsbrief.");
            }
            throw new Error(data.message || `Foutcode: ${response.status}`);
        }

        // Succes!
        messageBox.className = "message success";
        messageBox.innerText = "🚀 Gelukt! Je bent toegevoegd aan de database. Check je mailbox.";
        document.getElementById('newsletterForm').reset();

    } catch (fout) {
        console.error("Inschrijffout:", fout);
        messageBox.className = "message error";
        messageBox.innerText = `❌ Fout: ${fout.message}`;
    } finally {
        submitBtn.disabled = false;
    }
});
</script>

</body>
</html>
