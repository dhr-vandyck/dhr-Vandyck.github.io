<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nieuwsbrief Portaal</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px 20px; text-align: center; }
        .card { max-width: 500px; margin: 0 auto; padding: 40px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .message { display: block; padding: 15px; margin-top: 20px; border-radius: 6px; font-weight: bold; }
        .processing { background-color: #1e293b; color: #94a3b8; border: 1px solid #3b82f6; }
        .success { background-color: #064e3b; color: #10b981; border: 1px solid #10b981; }
        .warning { background-color: #78350f; color: #f59e0b; border: 1px solid #f59e0b; }
        .error { background-color: #7f1d1d; color: #f87171; border: 1px solid #f87171; }
        a { color: #3b82f6; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0; color:#3b82f6;">Nieuwsbrief Portaal</h2>
    <div id="portalMessage" class="message processing">Verbinding maken met de database...</div>
    <p style="margin-top:30px;"><a href="https://github.io">Terug naar de website</a></p>
</div>

<script>
const domeinDeel1 = "https://ozcsksqiizlhgrskmada";
const domeinDeel2 = ".supabase.co/rest/v1/";
const rpcPad     = "rpc/verwerk_portaal_status_update";

const SUPABASE_RPC_URL = domeinDeel1 + domeinDeel2 + rpcPad;
const SUPABASE_ANON_KEY = "sb_publishable_gCVtKZlvXTKTEniylj3kOA_QlkmewlU"; 

async function verwerkStatus() {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token'); 
    const action = urlParams.get('action'); 
    const messageText = document.getElementById('portalMessage');

    if (!token || !action) {
        messageText.className = "message error";
        messageText.innerText = "❌ Fout: Geen geldige portaal-token of actie gevonden in de link.";
        return;
    }

    messageText.innerText = action === 'confirm' ? "🚀 Je inschrijving verwerken..." : "Je uitschrijving verwerken...";

    try {
        const response = await fetch(SUPABASE_RPC_URL, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ p_token: token, p_action: action })
        });

        if (!response.ok) throw new Error("Er is een databasefout opgetreden.");
        const data = await response.json();

        // 1. Controleer op ongeldige tokens of acties
        if (data.status === 'invalid_token' || data.status === 'invalid_action') {
            messageText.className = "message error";
            messageText.innerText = "❌ Fout: Deze activatielink is ongeldig of verlopen.";
            return;
        }

        // 2. SITUATIE 1: De status is zojuist succesvol aangepast (Eerste klik)
        if (data.status === 'success') {
            messageText.className = "message success";
            if (data.action === 'confirm') {
                messageText.innerText = `🎉 Dank je wel! Je inschrijving op de nieuwsbrief is succesvol geactiveerd op ${data.db_date}.`;
            } else {
                messageText.className = "message success"; // Je kunt dit eventueel ook oranje/rood stylen via css indien gewenst
                messageText.innerText = `👋 Tot ziens! Je bent succesvol uitgeschreven op ${data.db_date}.`;
            }
        }

        // 3. SITUATIE 2: Er is niks gebeurd omdat de status al gelijk was (Volgende kliks)
        if (data.status === 'already_processed') {
            messageText.className = "message warning";
            if (data.action === 'confirm') {
                messageText.innerText = `ℹ️ Je bent al actief aangemeld op ${data.db_date}. Prettige dag verder!`;
            } else {
                messageText.innerText = `ℹ️ Je bent al veilig afgemeld geweest op ${data.db_date}. Prettige dag verder!`;
            }
        }

    } catch (err) {
        console.error("Verbindingsfout:", err);
        messageText.className = "message error";
        messageText.innerText = "❌ Fout: Er is een verbindingsfout opgetreden met de database.";
    }
}

window.addEventListener('DOMContentLoaded', verwerkStatus);
</script>

</body>
</html>
