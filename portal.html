<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nieuwsbrief Portaal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b111e; color: #f3f4f6; padding: 50px 20px; text-align: center; }
        .card { max-width: 500px; margin: 0 auto; padding: 40px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .message { display: block; padding: 15px; margin-top: 20px; border-radius: 6px; font-weight: bold; }
        .processing { background-color: #1e293b; color: #94a3b8; border: 1px solid #3b82f6; }
        .success { background-color: #064e3b; color: #10b981; border: 1px solid #10b981; }
        .warning { background-color: #78350f; color: #f59e0b; border: 1px solid #f59e0b; }
        .error { background-color: #7f1d1d; color: #f87171; border: 1px solid #f87171; }
        a { color: #3b82f6; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0; color:#3b82f6;">Nieuwsbrief Portaal</h2>
    <div id="portalMessage" class="message processing">Verbinding maken met de database...</div>
    <p style="margin-top:30px;"><a href="https://github.io">Terug naar de website</a></p>
</div>

<script>
const domeinDeel1 = "https://ozcsksqiizlhgrskmada";
const domeinDeel2 = ".supabase.co/rest/v1/";
const tabelNaam   = "nieuwsbrief_abonnees";

const SUPABASE_REST_URL = domeinDeel1 + domeinDeel2 + tabelNaam; 
const SUPABASE_ANON_KEY = "sb_publishable_gCVtKZlvXTKTEniylj3kOA_QlkmewlU"; 

async function verwerkStatus() {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token'); 
    const action = urlParams.get('action'); 
    const messageText = document.getElementById('portalMessage');

    if (!token || !action) {
        messageText.className = "message error";
        messageText.innerText = "❌ Fout: Geen geldige portaal-token of actie gevonden in de link.";
        return;
    }

    messageText.innerText = action === 'confirm' ? "🚀 Je inschrijving activeren in de database..." : "Je uitschrijven uit de database...";

    const nieuweStatus = action === 'confirm' ? 'active' : 'denied';

    try {
        const response = await fetch(`${SUPABASE_REST_URL}?token=eq.${token}`, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            },
            body: JSON.stringify({ status: nieuweStatus })
        });

        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            
            // Als de foutboodschap van onze nieuwe database-trigger binnenkomt:
            if (errorData.message && errorData.message.includes('Status is reeds')) {
                
                // We vissen de geformatteerde datum uit de foutmelding van de database
                // De database stuurt: "Status is reeds active sinds DD-MM-YYYY om HH:MM"
                const delen = errorData.message.split(' sinds ');
                const dbDatumEnTijd = delen[1] || "onbekende datum";
                
                messageText.className = "message warning";
                if (action === 'confirm') {
                    messageText.innerText = `ℹ️ Je bent al actief aangemeld op ${dbDatumEnTijd}. Prettige dag verder!`;
                } else {
                    messageText.innerText = `ℹ️ Je bent al veilig afgemeld geweest op ${dbDatumEnTijd}. Prettige dag verder!`;
                }
                return;
            }
            
            throw new Error(errorData.message || `HTTP Fout ${response.status}`);
        }

        const data = await response.json();

        if (data && data.length > 0) {
            messageText.className = "message success";
            messageText.innerText = action === 'confirm' 
                ? "Dank je wel! Je inschrijving op de nieuwsbrief is succesvol geactiveerd." 
                : "Tot ziens! Je bent succesvol uitgeschreven.";
        } else {
            messageText.className = "message error";
            messageText.innerText = "❌ Fout: Deze activatielink is ongeldig, al gebruikt of verlopen.";
        }

    } catch (err) {
        console.error("Database Fout:", err);
        
        if (err.message && err.message.includes('Status is reeds')) {
            const delen = err.message.split(' sinds ');
            const dbDatumEnTijd = delen[1] || "onbekende datum";
            
            messageText.className = "message warning";
            if (action === 'confirm') {
                messageText.innerText = `ℹ️ Je bent al actief aangemeld op ${dbDatumEnTijd}. Prettige dag verder!`;
            } else {
                messageText.innerText = `ℹ️ Je bent al veilig afgemeld geweest op ${dbDatumEnTijd}. Prettige dag verder!`;
            }
        } else {
            messageText.className = "message error";
            messageText.innerText = "❌ Fout: Er is een verbindingsfout opgetreden met de database.";
        }
    }
}

window.addEventListener('DOMContentLoaded', verwerkStatus);
</script>


</body>
</html>
