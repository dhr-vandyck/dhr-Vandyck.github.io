<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nieuwsbrief Portaal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b111e; color: #f3f4f6; padding: 50px 20px; text-align: center; }
        .card { background: #161f30; max-width: 500px; margin: 0 auto; padding: 40px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .message { display: block; padding: 15px; margin-top: 20px; border-radius: 6px; font-weight: bold; }
        .processing { background-color: #1e293b; color: #94a3b8; border: 1px solid #3b82f6; }
        .success { background-color: #064e3b; color: #10b981; border: 1px solid #10b981; }
        .error { background-color: #7f1d1d; color: #f87171; border: 1px solid #f87171; }
        a { color: #3b82f6; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0; color:#3b82f6;">Nieuwsbrief Portaal</h2>
    <div id="portalMessage" class="message processing">Verbinding maken met de database...</div>
    <p style="margin-top:30px;"><a href="https://github.io">Terug naar de website</a></p>
</div>

<!-- Gecorrigeerde Supabase SDK koppeling via module -->
<script type="module">
// 1. Importeer de Supabase bibliotheek via de volledige, juiste ESM link
import { createClient } from "https://unpkg.com";

// 2. JOUW SUPABASE PROJECT CONFIGURATIE
const SUPABASE_URL = "https://ixuuaddpxrefhlnrglin.supabase.co"; 
const SUPABASE_ANON_KEY = "sb_publishable_gCVtKZlvXTKTEniylj3kOA_QlkmewlU"; 

const MySupabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 3. Directe uitvoering van de logica bij het laden van de pagina
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');
const action = urlParams.get('action'); 
const messageText = document.getElementById('portalMessage');

// Controleer of de benodigde parameters in de link zitten
if (token && action) {
    messageText.innerText = action === 'confirm' ? "🚀 Je inschrijving activeren in de database..." : "Je uitschrijven uit de database...";

    try {
        if (action === 'confirm') {
            // Update de status naar 'active' in de database
            const { data, error } = await MySupabaseClient
                .from('nieuwsbrief_abonnees')
                .update({ status: 'active' })
                .eq('token', token)
                .select(); // Geeft terug of er écht een rij is aangepast
            
            if (error) throw error;
            
            if (data && data.length > 0) {
                messageText.className = "message success";
                messageText.innerText = "🎉 Dank je wel! Je inschrijving op de nieuwsbrief is succesvol geactiveerd.";
            } else {
                messageText.className = "message error";
                messageText.innerText = "❌ Fout: Deze activatielink is ongeldig, al gebruikt of verlopen.";
            }

        } else if (action === 'unsubscribe') {
            // Pas de status aan naar 'denied' in de database
            const { data, error } = await MySupabaseClient
                .from('nieuwsbrief_abonnees')
                .update({ status: 'denied' })
                .eq('token', token)
                .select();
            
            if (error) throw error;

            if (data && data.length > 0) {
                messageText.className = "message success";
                messageText.innerText = "👋 Tot ziens! Je bent succesvol uitgeschreven (Status: Geweigerd).";
            } else {
                messageText.className = "message error";
                messageText.innerText = "❌ Fout: Dit token is ongeldig of bestaat niet.";
            }
        }
    } catch (err) {
        console.error("Supabase Fout:", err);
        messageText.className = "message error";
        messageText.innerText = "❌ Fout: Er is een verbindingsfout opgetreden met de database.";
    }
} else {
    messageText.className = "message error";
    messageText.innerText = "❌ Fout: Geen geldige portaal-token of actie gevonden in de link.";
}
</script>

</body>
</html>
